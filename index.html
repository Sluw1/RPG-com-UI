<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RPG UI</title>

<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* tela principal */
#game {
    width: 1000px;
    height: 650px;
    background: #0f0f14;
    border: 2px solid #444;
    position: relative;
}

/* log estilo RPG */
#log {
    height: 340px;
    padding: 10px;
    overflow-y: auto;
    font-size: 16px;
}


#hud {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;

    background: #111;
    border-top: 2px solid #333;
    padding: 10px;

    box-sizing: border-box;
}
#screen {
    width: 100%;
    height: 100%;
    position: relative;
}

#buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    background: #222;
    border: 1px solid #444;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #333;
}

#loja {
    position: absolute;
    inset: 0;

    background: #0f0f14;

    display: none;
    z-index: 100;

    padding: 20px;
    overflow-y: auto;
}
#inventario {
    position: absolute;
    inset: 0;

    background: #0f0f14;

    display: none;
    z-index: 100;

    padding: 20px;
    overflow-y: auto;
}
#hudBatalha {
    position: absolute;
    top: 10px;
    right: 20px;

    width: 220px;
    color: white;
    font-family: Arial;
    z-index: 10;
}

.barra {
    margin-bottom: 8px;
    font-size: 12px;
}

.hpBar {
    width: 100%;
    height: 8px;
    background: #333;
    border: 1px solid #555;
    border-radius: 5px;
    overflow: hidden;
}

.hpFill {
    height: 100%;
    width: 100%;
    background: green;
    transition: width 0.2s;
}

#enemy-ui {
    position: absolute;
    top: 240px;
    right: 20px;
    width: 180px;
    text-align: center;
    font-family: Arial;
    color: white;
}

#enemy-name {
    font-size: 14px;
    margin-bottom: 5px;
}

#enemy-portrait {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border: 2px solid white;
    background: black;
    margin-bottom: 6px;
}

#enemy-hp-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border: 1px solid white;
}

#enemy-hp-fill {
    height: 100%;
    width: 100%;
    background: red;
    transition: width 0.2s;
}

#player-ui {
    text-align: center;
    margin-bottom: 10px;
}

#player-name {
    font-size: 14px;
    margin-bottom: 5px;
}

#player-portrait {
    width: 160px;
    height: 160px;
    object-fit: cover;
    border: 2px solid white;
    background: black;
    margin-bottom: 6px;
}
</style>
</head>

<body>

<div id="game">

    <div id="screen">

        <div id="log"></div>

        
        <div id="hud">
            <div id="status"></div>

            <div id="buttons">
                <button onclick="explorar()">Explorar</button>
                <button onclick="atacarUI()">Atacar</button>
                <button onclick="abrirLoja()">Loja</button>
                <button onclick="abrirInventario()">Inventário</button>
            </div>
        </div>

        
        <div id="loja"></div>

        
        <div id="inventario"></div>

        
        <div id="hudBatalha">

            <div id="player-ui">
                <div id="player-name">Slayer</div>

                <img id="player-portrait"
                     src="img/slayer.jpeg"
                     alt="Slayer">

                <div class="hpBar">
                    <div id="hpPlayer" class="hpFill"></div>
                </div>

                <span id="hpPlayerText"></span>
            </div>

            <div id="enemy-ui" style="display:none;">
                <div id="enemy-name"></div>

                <img id="enemy-portrait">

                <div class="hpBar">
                    <div id="enemy-hp-fill"></div>
                </div>

                <span id="enemy-hp-text"></span>
            </div>

        </div>

    </div>

</div>

<script src="game.js"></script>
</body>
</html>
